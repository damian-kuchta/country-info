<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Condensed&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <title>Country Info</title>
</head>
<body>
    <div class="app-wrap">
        <h1 class="app-header">Country Info</h1>
        <main class="main-content">
            <section class="select-wrap">
                <label class="select-wrap__label" for="countries">Type or select the name of the country:</label>
                <select  class="select-wrap__select" name="" id="countries">
                    <option selected disabled value="dasd">Select the country</option>
                </select>
            </section>
            <section class="country-info-container none">
                <div class="lds-ellipsis none"><div></div><div></div><div></div><div></div></div>
                <div class="flag-box">
                    <img class="flag-box__img"  alt="">
                </div>
                <div class="info-box">
                    <div class="info-box-wrap">
                        <p class="info-box__label">Country:</p>
                        <p class="info-box__data" data-type="name" id="country">Poland</p>
                    </div>
                    <div class="info-box-wrap">
                        <p class="info-box__label">Region:</p>
                        <p class="info-box__data" data-type="region" id="continent">Europe</p>
                    </div>
                    <div class="info-box-wrap">
                        <p class="info-box__label">Capital:</p>
                        <p class="info-box__data" data-type="capital" id="capital">Warsaw</p>
                    </div>
                    <div class="info-box-wrap">
                        <p class="info-box__label">Population:</p>
                        <p class="info-box__data" data-type="population" id="population">38000000</p>
                    </div>
                    <div class="info-box-wrap">
                        <p class="info-box__label">Area:</p>
                        <p class="info-box__data" data-type="area" id="area">356000 km2</p>
                    </div>
                    <div class="info-box-wrap">
                        <p class="info-box__label">Density:</p>
                        <p class="info-box__data" data-type="density" id="density">58</p>
                    </div>
                    <div class="info-box-wrap">
                        <p class="info-box__label">Currency:</p>
                        <p class="info-box__data" data-type="currency" id="currency">Polish Zloty</p>
                    </div>
                </div>
            </section>
        </main>
        <footer class="footer">
            <p class="footer__author">created by Damian Kuchta</p>
            <a class="footer__github-link" href="https://github.com/damian-kuchta/"><img class="footer__github-logo" src="./img/GitHub-Mark-Light-120px-plus.png" alt="Github logo"></a>
        </footer>
    </div>
    <script src="./js/script.js"></script>
</body>
</html>
